appId: com.monster.store
productName: STORE
directories:
  output: release
files:
  - dist/**/*
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**/*
win:
  target: nsis
  artifactName: ${productName} Setup ${version}-${arch}.${ext}
mac:
  target: dmg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
